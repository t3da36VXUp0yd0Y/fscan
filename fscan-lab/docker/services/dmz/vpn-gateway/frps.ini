# FRP 服务端配置
# VPN 网关上运行，用于建立代理隧道到办公网

[common]
# 监听端口（客户端连接端口）
bind_port = 7000

# Dashboard 配置（可选，用于查看连接状态）
dashboard_port = 7500
dashboard_user = admin
dashboard_pwd = fscan_lab_frp

# 日志配置
log_file = /var/log/frps.log
log_level = info
log_max_days = 3

# 性能配置
max_pool_count = 50
max_ports_per_client = 0

# 认证（这里不启用，因为是内网测试环境）
# token = your_secret_token
