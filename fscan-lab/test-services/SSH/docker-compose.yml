version: '3.8'

services:
  ssh:
    build: .
    container_name: ssh_test
    hostname: ssh-target
    ports:
      - "2222:22"  # 映射到宿主机2222端口
    networks:
      - test-network
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  test-network:
    driver: bridge

# 注意：不使用volumes挂载.ssh目录（会导致权限问题）
# authorized_keys在构建时COPY进镜像
